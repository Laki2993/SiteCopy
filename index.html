<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИПК "РБК" - Финансирование малоэтажного строительства</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section class="callBackContainer">
            <article class="callBackText">
                <h1>ИПК "РБК" <br> Финансирование малоэтажного строительства</h1>
                <p class="callBackDescription">ЦФО + 7 993 302-07-26 СЗФО +7 812 313-21-38</p>
            </article>
            <form class="callBackForm" action="#">
                <p class="formTitle">Заполните форму, чтобы начать сотрудничество и увеличить продажи!</p>
                <input type="text" class="callBackFormName" placeholder="Как к вам удобно обратиться?">
                <section class="callBackChoice">
                    <button class="callBackFormBtn" id="BtnPhone">
                        <img class="callBackImg" src="/assets/IconPhone.svg" alt="Phone">
                        <p class="callBackBtnText">Телефон</p>
                    </button>
                    <button class="callBackFormBtn" id="BtnTelegram">
                        <img class="callBackImg" src="/assets/IconTelegram.svg" alt="Telegram">
                        <p class="callBackBtnText">Telegram</p>
                    </button>
                    <button class="callBackFormBtn" id="BtnVk">
                        <img class="callBackImg" src="/assets/IconVk.svg" alt="Vk">
                        <p class="callBackBtnText">VK</p>
                    </button>
                    <button class="callBackFormBtn" id="BtnMax">
                        <img class="callBackImg" src="/assets/IconMax.svg" alt="Max">
                        <p class="callBackBtnText">Max</p>
                    </button>
                </section>
                <input type="text" class="callBackFormName" id="inputType" placeholder="Имя пользователя, ID или ссылка">
                <button class="callBackFormButton">НАЧАТЬ</button>

            </form>
        </section>
    </main>
    <footer>

    </footer>
    <script src="script.js"></script>
</body>
</html>
